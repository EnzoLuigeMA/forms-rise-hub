<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rise Hub — Diagnóstico Supabase</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:monospace;background:#0a0a0a;color:#00ff88;padding:30px;font-size:14px;line-height:1.8}
h1{color:#fff;margin-bottom:20px;font-size:18px}
.test{padding:12px 16px;margin:8px 0;border-radius:8px;background:#111}
.pass{border-left:4px solid #00ff88}
.fail{border-left:4px solid #ff4444;color:#ff4444}
.warn{border-left:4px solid #ffaa00;color:#ffaa00}
button{background:#00ff88;color:#000;padding:12px 24px;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:20px 0;font-weight:bold}
button:hover{background:#00cc66}
#results{white-space:pre-wrap}
</style>
</head>
<body>
<h1>🔍 Diagnóstico Completo — Rise Hub Supabase</h1>
<p style="color:#888;margin-bottom:20px">Clica no botão abaixo pra testar todas as operações do Supabase (INSERT, SELECT, UPDATE, DELETE)</p>
<button onclick="runDiagnostic()">🚀 Rodar Diagnóstico</button>
<div id="results"></div>

<script>
const SUPABASE_URL = 'https://ibidukamkkgsurqswsvf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImliaWR1a2Fta2tnc3VycXN3c3ZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NjMwMjksImV4cCI6MjA4OTUzOTAyOX0.YRLsf8b8ZNK0w9MXNy27Xz4WoBKV9DzNZfGVWf4zK2E';

const results = document.getElementById('results');

function log(msg, type='pass') {
  results.innerHTML += `<div class="test ${type}">${msg}</div>`;
}

async function runDiagnostic() {
  results.innerHTML = '';
  log('⏳ Iniciando diagnóstico...', 'warn');
  
  const timestamp = Date.now();
  const testEmail = `diag_${timestamp}@teste.com`;
  const testPhone = '(99) 99999-' + String(timestamp).slice(-4);
  let testLeadId = null;

  // ============================================================
  // TESTE 1: Conexão básica com Supabase
  // ============================================================
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/`, {
      headers: { 'apikey': SUPABASE_ANON_KEY }
    });
    if (res.ok) {
      log(`✅ TESTE 1: Conexão com Supabase OK (status ${res.status})`);
    } else {
      log(`❌ TESTE 1: Conexão falhou — status ${res.status} ${await res.text()}`, 'fail');
      return;
    }
  } catch(e) {
    log(`❌ TESTE 1: Erro de rede — ${e.message}`, 'fail');
    return;
  }

  // ============================================================
  // TESTE 2: Tabela leads_rise_hub existe?
  // ============================================================
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/leads_rise_hub?select=id&limit=1`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (res.ok) {
      const data = await res.json();
      log(`✅ TESTE 2: Tabela leads_rise_hub existe (${data.length} rows retornadas)`);
    } else {
      const err = await res.text();
      log(`❌ TESTE 2: Tabela leads_rise_hub — ${res.status}: ${err}`, 'fail');
      if (err.includes('permission denied') || res.status === 401) {
        log('   → Problema de RLS! A policy SELECT para anon não existe.', 'fail');
      }
      return;
    }
  } catch(e) {
    log(`❌ TESTE 2: ${e.message}`, 'fail');
    return;
  }

  // ============================================================
  // TESTE 3: INSERT com payload MÍNIMO (só campos obrigatórios)
  // ============================================================
  try {
    const minPayload = {
      nome: 'Teste Diagnóstico',
      email: testEmail,
      whatsapp: testPhone,
      segmento: 'medico',
      nome_clinica: 'Clínica Diagnóstico',
      entry_point: 'diagnostico'
    };
    
    const res = await fetch(`${SUPABASE_URL}/rest/v1/leads_rise_hub`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(minPayload)
    });
    
    if (res.ok) {
      const data = await res.json();
      testLeadId = data[0]?.id;
      log(`✅ TESTE 3: INSERT mínimo OK — Lead ID: ${testLeadId}`);
    } else {
      const err = await res.text();
      log(`❌ TESTE 3: INSERT mínimo FALHOU — ${res.status}: ${err}`, 'fail');
      if (err.includes('permission denied') || res.status === 403) {
        log('   → Problema de RLS! A policy INSERT para anon não existe.', 'fail');
      }
      if (res.status === 400) {
        log('   → Algum campo não existe na tabela! Rode o SQL completo.', 'fail');
      }
    }
  } catch(e) {
    log(`❌ TESTE 3: ${e.message}`, 'fail');
  }

  // ============================================================
  // TESTE 4: INSERT com TODOS os campos da LP v2
  // ============================================================
  try {
    const fullPayload = {
      segmento: 'medico',
      nome: 'Teste Full LP',
      whatsapp: '(22) 99999-' + String(timestamp + 1).slice(-4),
      email: `diag_full_${timestamp}@teste.com`,
      nome_clinica: 'Clínica Full Diagnóstico',
      cidade: 'BH - MG',
      cargo: 'proprietario',
      especialidade: 'Ortopedia',
      maior_dor: 'atendimento_falho',
      observacao: 'WhatsApp Clínica: (22) 99999-0002 | Impacto: 8 | Ticket: 300_500 | Faturamento: 25k_50k | Urgência: alta | Autonomia: sozinho',
      interesses: ['atendimento_falho'],
      orcamento: '25k_50k',
      created_at: new Date().toISOString(),
      lead_score: 145,
      lead_classification: 'HOT',
      utm_source: null,
      utm_medium: null,
      utm_campaign: null,
      fbclid: null,
      entry_point: 'diagnostico_full'
    };
    
    const res = await fetch(`${SUPABASE_URL}/rest/v1/leads_rise_hub`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(fullPayload)
    });
    
    if (res.ok) {
      const data = await res.json();
      log(`✅ TESTE 4: INSERT completo LP v2 OK — Lead ID: ${data[0]?.id}`);
    } else {
      const err = await res.text();
      log(`❌ TESTE 4: INSERT completo FALHOU — ${res.status}: ${err}`, 'fail');
      
      // Detectar qual campo é o problema
      if (res.status === 400 && err.includes('column')) {
        const match = err.match(/column "(\w+)"/);
        if (match) {
          log(`   → Coluna "${match[1]}" NÃO EXISTE na tabela! Rode o SQL.`, 'fail');
        }
      }
    }
  } catch(e) {
    log(`❌ TESTE 4: ${e.message}`, 'fail');
  }

  // ============================================================
  // TESTE 5: SELECT (check duplicado funciona?)
  // ============================================================
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/leads_rise_hub?email=eq.${encodeURIComponent(testEmail)}&select=id&limit=1`,
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (res.ok) {
      const data = await res.json();
      log(`✅ TESTE 5: SELECT (check duplicado) OK — encontrou ${data.length} lead(s)`);
    } else {
      log(`❌ TESTE 5: SELECT falhou — ${res.status}: ${await res.text()}`, 'fail');
    }
  } catch(e) {
    log(`❌ TESTE 5: ${e.message}`, 'fail');
  }

  // ============================================================
  // TESTE 6: UPDATE/PATCH (atualizar status → agendado)
  // ============================================================
  if (testLeadId) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/leads_rise_hub?id=eq.${testLeadId}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ status: 'agendado', notas_internas: 'Teste diagnóstico' })
      });
      if (res.ok || res.status === 204) {
        log(`✅ TESTE 6: PATCH (status → agendado) OK`);
      } else {
        log(`❌ TESTE 6: PATCH falhou — ${res.status}: ${await res.text()}`, 'fail');
      }
    } catch(e) {
      log(`❌ TESTE 6: ${e.message}`, 'fail');
    }
  } else {
    log('⚠️ TESTE 6: Pulado (INSERT do teste 3 falhou, sem ID pra PATCH)', 'warn');
  }

  // ============================================================
  // TESTE 7: Tabela bookings_rise_hub
  // ============================================================
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/bookings_rise_hub?status=eq.confirmado&select=id&limit=1`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (res.ok) {
      log(`✅ TESTE 7: Tabela bookings_rise_hub OK`);
    } else {
      log(`❌ TESTE 7: Tabela bookings_rise_hub — ${res.status}: ${await res.text()}`, 'fail');
    }
  } catch(e) {
    log(`❌ TESTE 7: ${e.message}`, 'fail');
  }

  // ============================================================
  // LIMPEZA: Deletar leads de teste
  // ============================================================
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/leads_rise_hub?entry_point=eq.diagnostico`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    await fetch(`${SUPABASE_URL}/rest/v1/leads_rise_hub?entry_point=eq.diagnostico_full`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    log('🧹 Limpeza: Leads de teste removidos (ou tentativa — DELETE pode não ter policy)', 'warn');
  } catch(e) {}

  log('\n✅ Diagnóstico completo!', 'pass');
}
</script>
</body>
</html>
